[tox]
minversion = 4.28.0
envlist = py3,pep8,docs

[testenv]
constraints =
  {env:TOX_CONSTRAINTS_FILE:https://releases.openstack.org/constraints/upper/master}
deps =
  -r{toxinidir}/test-requirements.txt
commands = stestr run {posargs}

[testenv:venv]
deps =
  -r{toxinidir}/test-requirements.txt
  -r{toxinidir}/doc/requirements.txt
commands = {posargs}

[testenv:pep8]
description =
  Run style checks.
deps =
  pre-commit
  {[testenv:mypy]deps}
commands =
  pre-commit run -a
  {[testenv:mypy]commands}

[testenv:mypy]
description =
  Run type checks.
deps =
  {[testenv]deps}
  mypy
  types-docutils
commands =
  mypy --cache-dir="{envdir}/mypy_cache" {posargs:stevedore}

[testenv:docs]
deps =
  -r{toxinidir}/doc/requirements.txt
commands = sphinx-build -a -E -W doc/source doc/build/html

[testenv:releasenotes]
skip_install = true
deps = {[testenv:docs]deps}
commands = sphinx-build -a -E -W releasenotes/source releasenotes/build/html

[testenv:bindep]
skip_install = true
# Do not install any requirements. We want this to be fast and work even if
# system dependencies are missing, since it's used to tell you what system
# dependencies are missing! This also means that bindep must be installed
# separately, outside of the requirements files, and develop mode disabled
# explicitly to avoid unnecessarily installing the checked-out repo too (this
# further relies on "tox.skipsdist = True" above).
deps = bindep
commands = bindep test
usedevelop = False

[flake8]
# We only enable the hacking (H) checks
select = H
ignore = H304,H405
show-source = True
exclude = .venv,.tox,dist,doc,releasenotes,*egg,build

[hacking]
import_exceptions =
  collections.abc
  typing
